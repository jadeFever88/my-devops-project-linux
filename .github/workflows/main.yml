name: DevOps CI  # Назва нашого процесу

on: [push]      # Запускати при кожному push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Це "заткне" попередження і оновить Node.js

jobs:
  check-code:
    runs-on: ubuntu-latest  # GitHub виділяє нам безкоштовну віртуалку
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Копіюємо твій код на віртуалку GitHub

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Перевірка на критичні помилки Python
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Docker Compose file
        run: docker compose config  # Перевірка правильності структури yaml
