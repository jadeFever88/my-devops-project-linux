name: DevOps Full Pipeline

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ЕТАП 1: Перевірка стилю коду (Linter)
  lint-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          pip install flake8

      - name: Lint with flake8
        run: |
          # Перевірка на критичні помилки
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate Docker Compose
        run: docker compose config

  # ЕТАП 2: Реальний запуск у Docker та Тести
  run-tests:
    needs: lint-and-config  # Запуститься тільки якщо лінтер пройшов успішно
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Start Stack
        run: docker compose up -d

      - name: Run Pytest in Container
        run: |
          sleep 5
          # Запускаємо тест саме у вашому сервісі backend
          docker compose run --rm backend pytest

      - name: Cleanup
        if: always()
        run: docker compose down

      - name: Send Telegram Notification
        if: always()  # Повідомлення прийде і при успіху, і при помилці
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Project: ${{ github.repository }}
            📝 Commit: ${{ github.event.head_commit.message }}
            👤 Author: ${{ github.actor }}
            📊 Status: ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}

            🔗 Check here: https://github.com/${{ github.repository }}/actions
