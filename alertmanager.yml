route:
  receiver: 'telegram-notifications'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
- name: 'telegram-notifications'
  telegram_configs:
  - bot_token: 'REPLACE_BOT_TOKEN'
    chat_id: REPLACE_CHAT_ID
    send_resolved: true
    parse_mode: 'HTML'
