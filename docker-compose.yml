services:
  web-site:
    image: nginx:alpine
    container_name: my-web-app
    ports:
      - "8081:80"
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - devops-net
    restart: always
    # --- ОБМЕЖЕННЯ ---
    deploy:
      resources:
        limits:
          cpus: '0.25'      # Не більше 25% одного ядра процесора
          memory: 64M       # Не більше 64 Мегабайт оперативки
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли
    healthcheck:
      # wget -q (тихо) -O /dev/null (не зберігати файл) --spider (не завантажувати, тільки перевірити)
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    networks:
      - devops-net
    depends_on:
      - database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли
    healthcheck:
      # Замість curl використовуємо вбудований python для запиту на самого себе
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  database:
    image: redis:alpine
    container_name: my-db
    networks:
      - devops-net
    restart: always
    # --- ОБМЕЖЕННЯ ---
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли


  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - devops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus  # Зберігаємо історію графіків тут
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - devops-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana  # <--- Ось тут магія збереження
    networks:
      - devops-net


  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    user: "0"
    volumes:
      - loki-data:/loki              # Зберігаємо ваші логи тут
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - devops-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - devops-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    user: root
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    entrypoint: >
      sh -c "cp /etc/alertmanager/alertmanager.yml /tmp/alertmanager.yml && 
             sed -i 's/REPLACE_MY_TOKEN/'$${TELEGRAM_BOT_TOKEN}'/g' /tmp/alertmanager.yml && 
             sed -i 's/123456789/'$${TELEGRAM_CHAT_ID}'/g' /tmp/alertmanager.yml && 
             exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - devops-net



networks:
  devops-net:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
