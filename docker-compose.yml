version: '3.8'

services:
  web-site:
    image: nginx:alpine
    container_name: my-web-app
    ports:
      - "8081:80"
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - devops-net
    restart: always
    # --- ОБМЕЖЕННЯ ---
    deploy:
      resources:
        limits:
          cpus: '0.25'      # Не більше 25% одного ядра процесора
          memory: 64M       # Не більше 64 Мегабайт оперативки
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли
    healthcheck:
      # wget -q (тихо) -O /dev/null (не зберігати файл) --spider (не завантажувати, тільки перевірити)
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    networks:
      - devops-net
    depends_on:
      - database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли
    healthcheck:
      # Замість curl використовуємо вбудований python для запиту на самого себе
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  database:
    image: redis:alpine
    container_name: my-db
    networks:
      - devops-net
    restart: always
    # --- ОБМЕЖЕННЯ ---
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # файл не більше 10 Мегабайт
        max-file: "3"     # зберігати тільки 3 останніх файли


  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - devops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - devops-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - devops-net


networks:
  devops-net:
    external: true
