global:
  scrape_interval: 15s # збирати дані кожні 15 секунд
  evaluation_interval: 15s # Як часто перевіряти правила алертингу

# Посилання на файл із правилами (наприклад, "контейнер впав")
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080'] # кажемо Прометею забирати дані у cAdvisor

  - job_name: 'my-docker-app-backend-1'
    static_configs:
       - targets: ['my-docker-app-backend-1:5000'] # Замініть на назву вашого сервісу та його порт
